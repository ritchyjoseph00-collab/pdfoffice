<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Résultat conversion</title>
</head>
<body>
  <h2>Conversion OK ✅</h2>

  <p>Fichier converti : <b th:text="${fileName}"></b></p>

  <p><a th:href="${downloadUrl}">Télécharger</a></p>

  <p th:if="${previewUrl}">
    <a th:href="${previewUrl}" target="_blank">Prévisualiser (PDF)</a>
  </p>

  <p><a href="/">Retour</a></p>
</body>
</html>
